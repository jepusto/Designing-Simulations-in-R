<script>
document.addEventListener("DOMContentLoaded", function() {
  // Create fixed toggle button
  const toggleBtn = document.createElement("button");
  toggleBtn.id = "fixed-sidebar-toggle";
  toggleBtn.title = "Toggle Sidebar";
  toggleBtn.setAttribute("aria-label", "Toggle Sidebar");

  // SVG Icons for Open vs Closed state
  const iconSidebarOpen = `
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
      <path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H2zm0 1h3v12H2V2zm4 12V2h8v12H6z"/>
    </svg>`;
    
  const iconSidebarClosed = `
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
      <path d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h12zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/>
      <path d="M11 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H10.5a.5.5 0 0 1 .5.5z"/>
    </svg>`;

  toggleBtn.innerHTML = iconSidebarOpen;

  toggleBtn.addEventListener("click", function() {
    const isHidden = document.body.classList.toggle("sidebar-hidden");
    toggleBtn.innerHTML = isHidden ? iconSidebarClosed : iconSidebarOpen;
  });

  document.body.appendChild(toggleBtn);
});
</script>
